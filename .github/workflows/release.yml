name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci-gate:
    # Lightweight CI gate — full matrix runs in ci.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test
      - name: Smoke test (server)
        run: node --input-type=module -e "import('${{ github.workspace }}/packages/server/dist/index.js').then(() => console.log('server OK'))"
      - name: Smoke test (dev)
        run: node ${{ github.workspace }}/packages/dev/src/cli.js --help
      - name: Smoke test (create)
        run: node ${{ github.workspace }}/packages/create-mctx-app/index.js --help

  release:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write  # provenance attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11.10.0
      - name: Release
        if: github.event_name == 'push'
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish @mctx-ai/app
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --provenance --access public
        working-directory: packages/server
      - name: Publish @mctx-ai/dev
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --provenance --access public
        working-directory: packages/dev
      - name: Publish create-mctx-app
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --provenance --access public
        working-directory: packages/create-mctx-app

  post-publish-check:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm propagation
        run: sleep 30
      - name: Verify published package
        run: npm install @mctx-ai/app@latest --dry-run
